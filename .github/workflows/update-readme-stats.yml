name: Auto Update Readme Telemetry

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Telemetry Updater
        run: |
          # The script is expected to be in the scripts/ folder
          python scripts/update_stats.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "sys: telemetry metrics compile update [skip ci]"
          file_pattern: "telemetry_dashboard.svg header.svg"
