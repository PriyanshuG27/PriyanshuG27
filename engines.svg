    <line x1="0" y1="30" x2="800" y2="30" /> <line x1="0" y1="60" x2="800" y2="60" /> <line x1="0" y1="90" x2="800" y2="90" /> <line x1="0" y1="120" x2="800" y2="120" /> <line x1="0" y1="150" x2="800" y2="150" /> <line x1="0" y1="180" x2="800" y2="180" /> <line x1="0" y1="210" x2="800" y2="210" /> <line x1="0" y1="240" x2="800" y2="240" /> <line x1="0" y1="270" x2="800" y2="270" /> <line x1="0" y1="300" x2="800" y2="300" /> <line x1="0" y1="330" x2="800" y2="330" />
    <line x1="100" y1="0" x2="100" y2="340" /> <line x1="200" y1="0" x2="200" y2="340" /> <line x1="300" y1="0" x2="300" y2="340" /> <line x1="400" y1="0" x2="400" y2="340" /> <line x1="500" y1="0" x2="500" y2="340" /> <line x1="600" y1="0" x2="600" y2="340" /> <line x1="700" y1="0" x2="700" y2="340" />
