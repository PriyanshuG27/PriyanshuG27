<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#080e1a" />
    </linearGradient>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="210" rx="10" fill="url(#bg)" stroke="#111827" stroke-width="1.5"/>
  <!-- Subtly Draw Grid Lines -->
  <g stroke="#10b981" stroke-width="0.5" stroke-opacity="0.03">
    <line x1="0" y1="35" x2="800" y2="35" />
    <line x1="0" y1="70" x2="800" y2="70" />
    <line x1="0" y1="105" x2="800" y2="105" />
    <line x1="0" y1="140" x2="800" y2="140" />
    <line x1="0" y1="175" x2="800" y2="175" />
    <line x1="133" y1="0" x2="133" y2="210" />
    <line x1="266" y1="0" x2="266" y2="210" />
    <line x1="399" y1="0" x2="399" y2="210" />
    <line x1="532" y1="0" x2="532" y2="210" />
    <line x1="665" y1="0" x2="665" y2="210" />
  </g>
  <!-- Header -->
  <text x="25" y="30" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold" filter="url(#glow-green)">[ 💾 STACK COMPILATION REFERENCE ]</text>
  <!-- Categories -->
  <!-- Col 1: Core / Compilers -->
  <rect x="20" y="50" width="175" height="140" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="35" y="72" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">// COMPILERS</text>
  <text x="35" y="98" fill="#e2e8f0" font-family="monospace" font-size="12">C++ (GCC)</text>
  <text x="35" y="120" fill="#e2e8f0" font-family="monospace" font-size="12">Python 3.x</text>
  <text x="35" y="142" fill="#e2e8f0" font-family="monospace" font-size="12">TypeScript</text>
  <text x="35" y="164" fill="#94a3b8" font-family="monospace" font-size="12">JavaScript, C</text>
  <!-- Col 2: Persistence -->
  <rect x="210" y="50" width="175" height="140" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="225" y="72" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">// PERSISTENCE</text>
  <text x="225" y="98" fill="#e2e8f0" font-family="monospace" font-size="12">PostgreSQL</text>
  <text x="225" y="120" fill="#94a3b8" font-family="monospace" font-size="11">(pgvector HNSW)</text>
  <text x="225" y="142" fill="#e2e8f0" font-family="monospace" font-size="12">Redis (Upstash)</text>
  <text x="225" y="164" fill="#94a3b8" font-family="monospace" font-size="12">Firestore, Mongo</text>
  <!-- Col 3: Engines / APIs -->
  <rect x="400" y="50" width="175" height="140" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="415" y="72" fill="#3b82f6" font-family="monospace" font-size="11" font-weight="bold">// ENGINES</text>
  <text x="415" y="98" fill="#e2e8f0" font-family="monospace" font-size="12">FastAPI (async)</text>
  <text x="415" y="120" fill="#e2e8f0" font-family="monospace" font-size="12">React (Vite)</text>
  <text x="415" y="142" fill="#e2e8f0" font-family="monospace" font-size="12">Flask / Node</text>
  <text x="415" y="164" fill="#94a3b8" font-family="monospace" font-size="12">Zustand, Express</text>
  <!-- Col 4: Infra / Dev -->
  <rect x="590" y="50" width="190" height="140" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="605" y="72" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold">// INFRASTRUCTURE</text>
  <text x="605" y="98" fill="#e2e8f0" font-family="monospace" font-size="12">Linux (Bash/Zsh)</text>
  <text x="605" y="120" fill="#e2e8f0" font-family="monospace" font-size="12">Docker</text>
  <text x="605" y="142" fill="#e2e8f0" font-family="monospace" font-size="12">GitHub Actions</text>
  <text x="605" y="164" fill="#94a3b8" font-family="monospace" font-size="12">Git, AWS Cloud</text>
</svg>