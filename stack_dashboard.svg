<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#070c18" />
      <stop offset="100%" stop-color="#0b1329" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fda4af" />
    </linearGradient>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="210" rx="8" fill="url(#bg)" stroke="#1e293b" stroke-width="1.2"/>
  <!-- Subtle Cyber Grid -->
  <g stroke="#10b981" stroke-width="0.5" stroke-opacity="0.03">
    <line x1="0" y1="30" x2="800" y2="30" /> <line x1="0" y1="60" x2="800" y2="60" /> <line x1="0" y1="90" x2="800" y2="90" /> <line x1="0" y1="120" x2="800" y2="120" /> <line x1="0" y1="150" x2="800" y2="150" /> <line x1="0" y1="180" x2="800" y2="180" />
    <line x1="100" y1="0" x2="100" y2="210" /> <line x1="200" y1="0" x2="200" y2="210" /> <line x1="300" y1="0" x2="300" y2="210" /> <line x1="400" y1="0" x2="400" y2="210" /> <line x1="500" y1="0" x2="500" y2="210" /> <line x1="600" y1="0" x2="600" y2="210" /> <line x1="700" y1="0" x2="700" y2="210" />
  </g>
  <!-- Header -->
  <line x1="20" y1="20" x2="780" y2="20" stroke="url(#rose-grad)" stroke-width="1.5" filter="url(#glow-blue)"/>
  <text x="30" y="45" fill="#f43f5e" font-family="monospace" font-size="12" font-weight="bold" filter="url(#glow-blue)">[ 💾 0x03 // STACK COMPILATION REFERENCE ]</text>
  
  <!-- Categories -->
  <!-- Col 1: Core / Compilers -->
  <rect x="30" y="60" width="170" height="130" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="45" y="82" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">// COMPILERS</text>
  <text x="45" y="105" fill="#e2e8f0" font-family="monospace" font-size="12">C++ (GCC)</text>
  <text x="45" y="125" fill="#e2e8f0" font-family="monospace" font-size="12">Python 3.x</text>
  <text x="45" y="145" fill="#e2e8f0" font-family="monospace" font-size="12">TypeScript</text>
  <text x="45" y="165" fill="#94a3b8" font-family="monospace" font-size="12">JavaScript, C</text>
  
  <!-- Col 2: Persistence -->
  <rect x="215" y="60" width="170" height="130" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="230" y="82" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">// PERSISTENCE</text>
  <text x="230" y="105" fill="#e2e8f0" font-family="monospace" font-size="12">PostgreSQL</text>
  <text x="230" y="125" fill="#94a3b8" font-family="monospace" font-size="11">(pgvector HNSW)</text>
  <text x="230" y="145" fill="#e2e8f0" font-family="monospace" font-size="12">Redis (Upstash)</text>
  <text x="230" y="165" fill="#94a3b8" font-family="monospace" font-size="12">Firestore, Mongo</text>
  
  <!-- Col 3: Engines / APIs -->
  <rect x="400" y="60" width="170" height="130" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="415" y="82" fill="#3b82f6" font-family="monospace" font-size="11" font-weight="bold">// ENGINES</text>
  <text x="415" y="105" fill="#e2e8f0" font-family="monospace" font-size="12">FastAPI (async)</text>
  <text x="415" y="125" fill="#e2e8f0" font-family="monospace" font-size="12">React (Vite)</text>
  <text x="415" y="145" fill="#e2e8f0" font-family="monospace" font-size="12">Flask / Node</text>
  <text x="415" y="165" fill="#94a3b8" font-family="monospace" font-size="12">Zustand, Express</text>
  
  <!-- Col 4: Infra / Dev -->
  <rect x="585" y="60" width="185" height="130" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="600" y="82" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold">// INFRASTRUCTURE</text>
  <text x="600" y="105" fill="#e2e8f0" font-family="monospace" font-size="12">Linux (Bash/Zsh)</text>
  <text x="600" y="125" fill="#e2e8f0" font-family="monospace" font-size="12">Docker</text>
  <text x="600" y="145" fill="#e2e8f0" font-family="monospace" font-size="12">GitHub Actions</text>
  <text x="600" y="165" fill="#94a3b8" font-family="monospace" font-size="12">Git, AWS Cloud</text>
</svg>