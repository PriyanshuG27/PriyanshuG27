<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#070c18" />
      <stop offset="100%" stop-color="#0b1329" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fda4af" />
    </linearGradient>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="380" rx="8" fill="url(#bg)" stroke="#1e293b" stroke-width="1.2"/>
  <!-- Subtle Cyber Grid -->
  <g stroke="#10b981" stroke-width="0.5" stroke-opacity="0.03">
    <line x1="0" y1="30" x2="800" y2="30" /> <line x1="0" y1="60" x2="800" y2="60" /> <line x1="0" y1="90" x2="800" y2="90" /> <line x1="0" y1="120" x2="800" y2="120" /> <line x1="0" y1="150" x2="800" y2="150" /> <line x1="0" y1="180" x2="800" y2="180" /> <line x1="0" y1="210" x2="800" y2="210" /> <line x1="0" y1="240" x2="800" y2="240" /> <line x1="0" y1="270" x2="800" y2="270" /> <line x1="0" y1="300" x2="800" y2="300" /> <line x1="0" y1="330" x2="800" y2="330" /> <line x1="0" y1="360" x2="800" y2="360" />
    <line x1="100" y1="0" x2="100" y2="380" /> <line x1="200" y1="0" x2="200" y2="380" /> <line x1="300" y1="0" x2="300" y2="380" /> <line x1="400" y1="0" x2="400" y2="380" /> <line x1="500" y1="0" x2="500" y2="380" /> <line x1="600" y1="0" x2="600" y2="380" /> <line x1="700" y1="0" x2="700" y2="380" />
  </g>
  <!-- Header -->
  <line x1="20" y1="20" x2="780" y2="20" stroke="url(#emerald-grad)" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="30" y="45" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold" filter="url(#glow-green)">[ 📊 0x05 // DIAGNOSTICS &amp; SYSTEM TELEMETRY ]</text>
  
  <!-- Card 1: Core Metrics -->
  <rect x="30" y="60" width="360" height="90" rx="6" fill="#020617" fill-opacity="0.8" stroke="#1f2937" stroke-width="1"/>
  <text x="45" y="80" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">// METRICS SUMMARY</text>
  <text x="45" y="105" fill="#94a3b8" font-family="monospace" font-size="12">COMMITS : <tspan fill="#e2e8f0" font-weight="bold">274</tspan></text>
  <text x="210" y="105" fill="#94a3b8" font-family="monospace" font-size="12">STARS : <tspan fill="#e2e8f0" font-weight="bold">3</tspan></text>
  <text x="45" y="130" fill="#94a3b8" font-family="monospace" font-size="12">REPOS   : <tspan fill="#e2e8f0" font-weight="bold">11</tspan></text>
  <text x="210" y="130" fill="#94a3b8" font-family="monospace" font-size="12">STREAK: <tspan fill="#f59e0b" font-weight="bold">15 Days</tspan></text>
  
  <!-- Card 2: Uptime Status -->
  <rect x="30" y="165" width="360" height="90" rx="6" fill="#020617" fill-opacity="0.8" stroke="#1f2937" stroke-width="1"/>
  <text x="45" y="185" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">// SYSTEM UPTIME STREAK</text>
  <rect x="45" y="200" width="330" height="12" rx="3" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <rect x="45" y="200" width="330" height="12" rx="3" fill="url(#emerald-grad)" filter="url(#glow-green)"/>
  <text x="45" y="235" fill="#94a3b8" font-family="monospace" font-size="11">uptime_status: <tspan fill="#10b981">100% STABLE</tspan></text>
  
  <!-- Card 3: Language Weight (Glow Bars) -->
  <rect x="410" y="60" width="360" height="195" rx="6" fill="#020617" fill-opacity="0.8" stroke="#1f2937" stroke-width="1"/>
  <text x="425" y="80" fill="#3b82f6" font-family="monospace" font-size="11" font-weight="bold">// LANGUAGE WEIGHT ANALYZER</text>
  <!-- JS Bar -->
  <text x="425" y="105" fill="#e2e8f0" font-family="monospace" font-size="11">JavaScript (30%)</text>
  <rect x="520" y="97" width="230" height="8" rx="2" fill="#111827"/>
  <rect x="520" y="97" width="69" height="8" rx="2" fill="url(#cyan-grad)"/>
  <!-- HTML Bar -->
  <text x="425" y="130" fill="#e2e8f0" font-family="monospace" font-size="11">HTML (20%)</text>
  <rect x="520" y="122" width="230" height="8" rx="2" fill="#111827"/>
  <rect x="520" y="122" width="46" height="8" rx="2" fill="url(#blue-grad)"/>
  <!-- KT Bar -->
  <text x="425" y="155" fill="#e2e8f0" font-family="monospace" font-size="11">Python (20%)</text>
  <rect x="520" y="147" width="230" height="8" rx="2" fill="#111827"/>
  <rect x="520" y="147" width="46" height="8" rx="2" fill="url(#amber-grad)"/>
  <!-- C++ Bar -->
  <text x="425" y="180" fill="#e2e8f0" font-family="monospace" font-size="11">Kotlin (10%)</text>
  <rect x="520" y="172" width="230" height="8" rx="2" fill="#111827"/>
  <rect x="520" y="172" width="23" height="8" rx="2" fill="url(#emerald-grad)"/>
  <!-- TS Bar -->
  <text x="425" y="205" fill="#e2e8f0" font-family="monospace" font-size="11">C++ (10%)</text>
  <rect x="520" y="197" width="230" height="8" rx="2" fill="#111827"/>
  <rect x="520" y="197" width="23" height="8" rx="2" fill="url(#rose-grad)"/>

  <!-- Card 4: Activity Vector (Spider Grid) -->
  <rect x="30" y="270" width="740" height="95" rx="6" fill="#020617" fill-opacity="0.8" stroke="#1f2937" stroke-width="1"/>
  <text x="45" y="290" fill="#f43f5e" font-family="monospace" font-size="11" font-weight="bold">// ACTIVITY VECTOR (SPIDER DIAGNOSTICS)</text>
  <!-- Grid layout inside vector card -->
  <!-- Left Side: Radar Data points -->
  <text x="45" y="315" fill="#94a3b8" font-family="monospace" font-size="11">COMMITS : <tspan fill="#e2e8f0" font-weight="bold">274</tspan></text>
  <text x="45" y="335" fill="#94a3b8" font-family="monospace" font-size="11">PULL REQS: <tspan fill="#f59e0b" font-weight="bold">3%</tspan></text>
  <text x="180" y="315" fill="#94a3b8" font-family="monospace" font-size="11">CODE REVS: <tspan fill="#64748b">0%</tspan></text>
  <text x="180" y="335" fill="#94a3b8" font-family="monospace" font-size="11">ISSUES   : <tspan fill="#64748b">0%</tspan></text>
  <!-- Right Side: Graphic Radar Simulation -->
  <g stroke="#1e293b" stroke-width="0.8" fill="none">
    <!-- Crosshairs -->
    <line x1="560" y1="315" x2="680" y2="315" stroke-dasharray="2 2"/>
    <line x1="620" y1="285" x2="620" y2="345" stroke-dasharray="2 2"/>
    <!-- Outer Box -->
    <rect x="570" y="290" width="100" height="50" rx="3" stroke="#1f2937"/>
    <!-- Radar Line representing data (glowing green line) -->
    <!-- Commits are at 97% (extends far left), PRs 3% (extends down slightly) -->
    <!-- Nodes -->
    <line x1="575" y1="315" x2="620" y2="315" stroke="#10b981" stroke-width="1.8" filter="url(#glow-green)"/>
    <line x1="620" y1="315" x2="620" y2="320" stroke="#f59e0b" stroke-width="1.8" filter="url(#glow-amber)"/>
    <circle cx="575" cy="315" r="3.5" fill="#10b981" filter="url(#glow-green)"/>
    <circle cx="620" cy="320" r="2.5" fill="#f59e0b"/>
  </g>
  <text x="690" y="312" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">COMMITS: 97%</text>
  <text x="690" y="330" fill="#94a3b8" font-family="monospace" font-size="11">PULL REQS: 3%</text>
</svg>