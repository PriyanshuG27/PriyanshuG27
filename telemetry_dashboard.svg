<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#070c17" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="glow-emerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="280" rx="10" fill="url(#bg)" stroke="#111827" stroke-width="1.5"/>
  <!-- Subtly Draw Grid Lines -->
  <g stroke="#10b981" stroke-width="0.5" stroke-opacity="0.03">
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="160" y1="0" x2="160" y2="280" />
    <line x1="320" y1="0" x2="320" y2="280" />
    <line x1="480" y1="0" x2="480" y2="280" />
    <line x1="640" y1="0" x2="640" y2="280" />
  </g>
  <!-- Header -->
  <text x="25" y="30" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold" filter="url(#glow-emerald)">[ 📊 DIAGNOSTICS &amp; SYSTEM TELEMETRY ]</text>
  <!-- Card 1: Core Metrics -->
  <rect x="20" y="55" width="360" height="95" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="35" y="78" fill="#10b981" font-family="monospace" font-size="11" font-weight="bold">// METRICS SUMMARY</text>
  <text x="35" y="105" fill="#94a3b8" font-family="monospace" font-size="12">COMMITS : <tspan fill="#e2e8f0" font-weight="bold">274</tspan></text>
  <text x="200" y="105" fill="#94a3b8" font-family="monospace" font-size="12">STARS : <tspan fill="#e2e8f0" font-weight="bold">3</tspan></text>
  <text x="35" y="130" fill="#94a3b8" font-family="monospace" font-size="12">REPOS   : <tspan fill="#e2e8f0" font-weight="bold">10</tspan></text>
  <text x="200" y="130" fill="#94a3b8" font-family="monospace" font-size="12">STREAK: <tspan fill="#f59e0b" font-weight="bold">15 Days</tspan></text>
  <!-- Card 2: Uptime Status -->
  <rect x="20" y="165" width="360" height="95" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="35" y="188" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">// SYSTEM UPTIME STREAK</text>
  <!-- Progress Bar Outer -->
  <rect x="35" y="205" width="330" height="15" rx="3" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <!-- Progress Bar Inner -->
  <rect x="35" y="205" width="330" height="15" rx="3" fill="url(#emerald-grad)" filter="url(#glow-emerald)"/>
  <text x="35" y="245" fill="#94a3b8" font-family="monospace" font-size="11">uptime_status: <tspan fill="#10b981">100% STABLE</tspan></text>
  <!-- Card 3: Language Weight (Glow Bars) -->
  <rect x="400" y="55" width="380" height="205" rx="6" fill="#020617" stroke="#1f2937" stroke-width="1"/>
  <text x="415" y="78" fill="#3b82f6" font-family="monospace" font-size="11" font-weight="bold">// LANGUAGE WEIGHT ANALYZER</text>
  <!-- JS Bar -->
  <text x="415" y="108" fill="#e2e8f0" font-family="monospace" font-size="11">JavaScript (33%)</text>
  <rect x="520" y="98" width="230" height="10" rx="2" fill="#111827"/>
  <rect x="520" y="98" width="75" height="10" rx="2" fill="url(#cyan-grad)"/>
  <!-- TS Bar -->
  <text x="415" y="138" fill="#e2e8f0" font-family="monospace" font-size="11">HTML (22%)</text>
  <rect x="520" y="128" width="230" height="10" rx="2" fill="#111827"/>
  <rect x="520" y="128" width="50" height="10" rx="2" fill="url(#blue-grad)"/>
  <!-- C++ Bar -->
  <text x="415" y="168" fill="#e2e8f0" font-family="monospace" font-size="11">Kotlin (11%)</text>
  <rect x="520" y="158" width="230" height="10" rx="2" fill="#111827"/>
  <rect x="520" y="158" width="25" height="10" rx="2" fill="url(#amber-grad)"/>
  <!-- Python Bar -->
  <text x="415" y="198" fill="#e2e8f0" font-family="monospace" font-size="11">C++ (11%)</text>
  <rect x="520" y="188" width="230" height="10" rx="2" fill="#111827"/>
  <rect x="520" y="188" width="25" height="10" rx="2" fill="url(#emerald-grad)"/>
  <!-- Kotlin Bar -->
  <text x="415" y="228" fill="#e2e8f0" font-family="monospace" font-size="11">TypeScript (11%)</text>
  <rect x="520" y="218" width="230" height="10" rx="2" fill="#111827"/>
  <rect x="520" y="218" width="25" height="10" rx="2" fill="#64748b"/>
</svg>