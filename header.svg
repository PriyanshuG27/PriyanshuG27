<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#05101a" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="180" rx="10" fill="url(#bg)" stroke="#111827" stroke-width="1.5"/>
  <!-- Subtly Draw Grid Lines -->
  <g stroke="#10b981" stroke-width="0.5" stroke-opacity="0.04">
    <line x1="0" y1="30" x2="800" y2="30" />
    <line x1="0" y1="60" x2="800" y2="60" />
    <line x1="0" y1="90" x2="800" y2="90" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="100" y1="0" x2="100" y2="180" />
    <line x1="200" y1="0" x2="200" y2="180" />
    <line x1="300" y1="0" x2="300" y2="180" />
    <line x1="400" y1="0" x2="400" y2="180" />
    <line x1="500" y1="0" x2="500" y2="180" />
    <line x1="600" y1="0" x2="600" y2="180" />
    <line x1="700" y1="0" x2="700" y2="180" />
  </g>
  <!-- Main border glow -->
  <line x1="20" y1="20" x2="780" y2="20" stroke="url(#accent-grad)" stroke-width="2" filter="url(#glow)"/>
  <!-- Telemetry Content -->
  <text x="35" y="65" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" letter-spacing="3">PRIYANSHU GUMBER</text>
  <text x="35" y="95" fill="#10b981" font-family="monospace" font-size="14" font-weight="bold">> SYSTEMS ARCHITECT // COMPILER CORE ACTIVE</text>
  <!-- System Metrics Box -->
  <rect x="35" y="120" width="450" height="35" rx="6" fill="#030712" fill-opacity="0.6" stroke="#1f2937" stroke-width="1"/>
  <text x="50" y="142" fill="#94a3b8" font-family="monospace" font-size="11">[ LOAD: <tspan fill="#f59e0b">0.10</tspan> | CORE: <tspan fill="#10b981">OK</tspan> | SHELL: <tspan fill="#3b82f6">CS-BASH</tspan> | COMPILING: <tspan fill="#ef4444">15d</tspan> ]</text>
  <!-- Glowing Status Light -->
  <circle cx="740" cy="60" r="8" fill="#10b981" filter="url(#glow)"/>
  <circle cx="740" cy="60" r="4" fill="#ffffff" />
  <text x="645" y="65" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold">CORE ONLINE</text>
  <!-- Visual graph node overlay on right -->
  <g stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" fill="none">
    <circle cx="700" cy="120" r="5" fill="#3b82f6" fill-opacity="0.6"/>
    <circle cx="740" cy="140" r="4" fill="#10b981" fill-opacity="0.6"/>
    <circle cx="670" cy="150" r="3" fill="#f59e0b" fill-opacity="0.6"/>
    <line x1="700" y1="120" x2="740" y2="140" />
    <line x1="700" y1="120" x2="670" y2="150" />
  </g>
</svg>