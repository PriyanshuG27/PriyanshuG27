<svg xmlns="http://www.w3.org/2000/svg" width="800" height="190" viewBox="0 0 800 190">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#070c18" />
      <stop offset="100%" stop-color="#0b1329" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fda4af" />
    </linearGradient>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="190" rx="8" fill="url(#bg)" stroke="#1e293b" stroke-width="1.2"/>
  <!-- Subtle Cyber Grid -->
  <g stroke="#10b981" stroke-width="0.5" stroke-opacity="0.03">
    <line x1="0" y1="30" x2="800" y2="30" /> <line x1="0" y1="60" x2="800" y2="60" /> <line x1="0" y1="90" x2="800" y2="90" /> <line x1="0" y1="120" x2="800" y2="120" /> <line x1="0" y1="150" x2="800" y2="150" /> <line x1="0" y1="180" x2="800" y2="180" />
    <line x1="100" y1="0" x2="100" y2="190" /> <line x1="200" y1="0" x2="200" y2="190" /> <line x1="300" y1="0" x2="300" y2="190" /> <line x1="400" y1="0" x2="400" y2="190" /> <line x1="500" y1="0" x2="500" y2="190" /> <line x1="600" y1="0" x2="600" y2="190" /> <line x1="700" y1="0" x2="700" y2="190" />
  </g>
  <!-- Glowing border accent -->
  <line x1="20" y1="20" x2="780" y2="20" stroke="url(#amber-grad)" stroke-width="1.5" filter="url(#glow-amber)"/>
  <!-- Section Title -->
  <text x="30" y="45" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold" filter="url(#glow-amber)">[ 📡 0x01 // SYSTEM PARAMETERS ]</text>
  <!-- YAML Content Box -->
  <rect x="30" y="60" width="740" height="110" rx="6" fill="#020617" fill-opacity="0.8" stroke="#1f2937" stroke-width="1"/>
  
  <text x="50" y="85" fill="#10b981" font-family="monospace" font-size="12">host_telemetry:</text>
  <text x="70" y="105" fill="#94a3b8" font-family="monospace" font-size="12">username: <tspan fill="#e2e8f0">priyanshug27</tspan></text>
  <text x="70" y="125" fill="#94a3b8" font-family="monospace" font-size="12">env_mode: <tspan fill="#e2e8f0">B.Tech CS @ Jaypee Institute of Information Technology (JIIT Noida)</tspan></text>
  <text x="70" y="145" fill="#94a3b8" font-family="monospace" font-size="12">geography: <tspan fill="#e2e8f0">Noida, IN</tspan> | status: <tspan fill="#10b981">Active (Systems Development)</tspan></text>
</svg>